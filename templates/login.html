<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication - NEXUS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
    <div class="container block-center">
        <h1 style="font-size: 3rem; margin-bottom: 2rem;"><i class="fa-solid fa-cubes"></i> NEXUS</h1>
        <div class="card" style="max-width: 450px; width: 100%;">
            <div class="tab-buttons" style="display:flex; justify-content:space-between; margin-bottom:2rem; gap: 15px;">
                <button onclick="toggleAuth('login')" id="btn-login" class="btn" style="flex:1">Sign In</button>
                <button onclick="toggleAuth('signup')" id="btn-signup" class="btn btn-secondary" style="flex:1">Register</button>
            </div>
            
            <div id="error-msg" style="display:none;"></div>
            <div id="success-msg" style="display:none;"></div>
            
            <div id="login-form">
                <h2 style="font-size: 2rem; margin-bottom: 1.5rem;">Access Portal</h2>
                <div style="position: relative;">
                    <i class="fa-regular fa-envelope" style="position: absolute; left: 18px; top: 17px; color: var(--text-muted);"></i>
                    <input type="email" id="email" placeholder="Email Address" style="padding-left: 48px;">
                </div>
                <div style="position: relative;">
                    <i class="fa-solid fa-lock" style="position: absolute; left: 18px; top: 17px; color: var(--text-muted);"></i>
                    <input type="password" id="password" placeholder="Password" style="padding-left: 48px;">
                </div>
                <button onclick="login()" id="logBtn" class="btn" style="width:100%; margin-top:15px; padding:16px;"><i class="fa-solid fa-right-to-bracket"></i> Login into Platform</button>

                <div style="display:flex; align-items:center; gap:12px; margin-top:18px;">
                    <div style="flex:1; height:1px; background:var(--border);"></div>
                    <span style="color:var(--text-muted); font-size:0.85rem; font-weight:500;">or continue with</span>
                    <div style="flex:1; height:1px; background:var(--border);"></div>
                </div>

                <button onclick="signInWithGoogle()" id="googleBtn" style="
                    width:100%; margin-top:14px; padding:14px 20px;
                    background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.12);
                    color:#f1f5f9; border-radius:12px; font-family:'Outfit',sans-serif;
                    font-size:1rem; font-weight:600; cursor:pointer;
                    display:flex; align-items:center; justify-content:center; gap:12px;
                    transition:all 0.3s;
                " onmouseover="this.style.background='rgba(255,255,255,0.1)'" onmouseout="this.style.background='rgba(255,255,255,0.06)'">
                    <svg width="20" height="20" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
                        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                    </svg>
                    Sign in with Google
                </button>
            </div>
            
            <div id="signup-form" style="display:none;">
                <h2 style="font-size: 2rem; margin-bottom: 1.5rem;">Create Profile</h2>
                <div style="position: relative;">
                    <i class="fa-regular fa-user" style="position: absolute; left: 18px; top: 17px; color: var(--text-muted);"></i>
                    <input type="text" id="regName" placeholder="Full Name" style="padding-left: 48px;">
                </div>
                <div style="position: relative;">
                    <i class="fa-regular fa-envelope" style="position: absolute; left: 18px; top: 17px; color: var(--text-muted);"></i>
                    <input type="email" id="regEmail" placeholder="Email Address" style="padding-left: 48px;">
                </div>
                <div style="position: relative;">
                    <i class="fa-solid fa-lock" style="position: absolute; left: 18px; top: 17px; color: var(--text-muted);"></i>
                    <input type="password" id="regPassword" placeholder="Strong Password" style="padding-left: 48px;">
                </div>
                <div style="position: relative;">
                    <i class="fa-solid fa-user-tag" style="position: absolute; left: 18px; top: 17px; color: var(--text-muted);"></i>
                    <select id="regRole" style="padding-left: 48px;">
                        <option value="" disabled selected>Assign Framework Role</option>
                        <option value="Student">Student (ERP/LMS)</option>
                        <option value="Faculty">Faculty (ERP/LMS)</option>
                        <option value="Admin">Administrator (CRM/ERP)</option>
                    </select>
                </div>
                <button onclick="register()" id="regBtn" class="btn" style="width:100%; margin-top:10px; padding:16px;"><i class="fa-solid fa-user-plus"></i> Create Account</button>
            </div>
            
            <div style="margin-top: 2.5rem; text-align:center;">
                <a href="/" style="color: var(--text-muted); text-decoration: none; font-size: 0.95rem; display:inline-flex; align-items:center; gap:8px; transition: color 0.3s;"><i class="fa-solid fa-arrow-left-long"></i> Back to Homepage</a>
            </div>
        </div>
    </div>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
